[changelog]
header = """
# Changelog

All notable changes to Phase4 are documented here.

Generated from [Conventional Commits](https://www.conventionalcommits.org/) with [git-cliff](https://github.com/orhun/git-cliff).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}\
{% else %}\
## [Unreleased]\
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.breaking %}**BREAKING** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/rayboyd/phase4/commit/{{ commit.id }})){% endif %}
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat",     group = "Features" },
    { message = "^fix",      group = "Bug Fixes" },
    { message = "^perf",     group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs",     group = "Documentation" },
    { message = "^test",     group = "Testing" },
    { message = "^build",    group = "Build" },
    { message = "^ci",       group = "CI/CD" },
    { message = "^chore",    skip = true },
    { message = "^style",    skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
