[advisories]
version = 2
unmaintained = "all"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[graph]
targets = [
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
