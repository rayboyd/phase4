name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
      - "KEYS"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
      - "KEYS"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - display-bins-32
          - display-bins-64
          - display-bins-128
          - display-bins-256
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libasound2-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.features }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo ci-fmt

      - name: Clippy
        run: cargo clippy --no-default-features --features ${{ matrix.features }} -- -D warnings

      - name: Check
        run: cargo ci-check --features ${{ matrix.features }}

      - name: Test
        run: cargo ci-test --features ${{ matrix.features }}

      - name: Audit
        run: cargo audit

      - name: Deny Check
        run: cargo deny check
